<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #f5f7f9;
      --text-color: #333;
    }
    body {
      width: 200px;
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      text-align: center;
    }
    h1 {
      font-size: 18px;
      color: #4a90e2;
      margin-top: 0;
    }
    #status {
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .status-off { color: #888; }
    .status-on { color: #27ae60; }
    
    #toggle_btn {
      width: 100%;
      height: 45px;
      background-color: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    #toggle_btn.running {
      background-color: #e74c3c; /* 執行中變成紅色停止按鈕 */
    }
    #toggle_btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>7000單全自動掛機</h1>
  <div id="status" class="status-off">狀態：等待中...</div>
  <button id="toggle_btn">啟動自動答題</button>

  <script src="popup.js"></script>
</body>
</html>
